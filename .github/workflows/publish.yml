name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: PyPI リリース
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Trusted Publisher (OIDC) — パスワード不要

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ビルドツール インストール
        run: pip install build

      - name: パッケージビルド
        run: python -m build

      - name: PyPI へアップロード
        uses: pypa/gh-action-pypi-publish@release/v1
